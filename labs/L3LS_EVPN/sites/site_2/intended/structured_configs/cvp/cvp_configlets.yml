    \  no shutdown\n   mtu 1500\n   no switchport\n   ip address 172.16.2.17/31\n!\ninterface
    Ethernet3\n   description P2P_LINK_TO_S2-SPINE2_Ethernet7\n   no shutdown\n   mtu
