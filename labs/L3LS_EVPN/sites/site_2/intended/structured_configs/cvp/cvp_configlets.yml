    group EVPN-OVERLAY-CORE\n   neighbor 10.250.1.7 remote-as 65103\n   neighbor 10.250.1.7
    description s1-brdr1\n   neighbor 10.250.2.1 peer group EVPN-OVERLAY-PEERS\n   neighbor
    10.250.2.1 remote-as 65200\n   neighbor 10.250.2.1 description s2-spine1\n   neighbor
