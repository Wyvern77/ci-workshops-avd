    20 vni 10020\n   vxlan vlan 30 vni 10030\n   vxlan vlan 40 vni 10040\n   vxlan
    vrf OVERLAY vni 10\n!\nip virtual-router mac-address 00:1c:73:00:00:99\n!\nip
    routing\nip routing vrf OVERLAY\n!\nip prefix-list PL-LOOPBACKS-EVPN-OVERLAY\n
