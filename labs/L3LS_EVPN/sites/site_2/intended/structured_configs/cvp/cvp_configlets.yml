    \  neighbor 10.250.2.2 description s2-spine2\n   neighbor 10.252.2.9 peer group
    MLAG-IPv4-UNDERLAY-PEER\n   neighbor 10.252.2.9 description s2-brdr2\n   neighbor
    172.16.2.16 peer group IPv4-UNDERLAY-PEERS\n   neighbor 172.16.2.16 remote-as
