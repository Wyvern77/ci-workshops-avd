    \  no shutdown\n   ip address 10.255.2.7/32\n!\ninterface Management0\n   description
    oob_management\n   no shutdown\n   ip address 192.168.0.200/24\n!\ninterface Vlan10\n
    \  description Ten\n   no shutdown\n   vrf OVERLAY\n   ip address virtual 10.10.10.1/24\n!\ninterface
    Vlan20\n   description Twenty\n   no shutdown\n   vrf OVERLAY\n   ip address virtual
