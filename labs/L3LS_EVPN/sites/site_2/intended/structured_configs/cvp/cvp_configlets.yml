    1500\n   vrf OVERLAY\n   ip address 10.252.2.8/31\n!\ninterface Vlan4093\n   description
    MLAG_PEER_L3_PEERING\n   no shutdown\n   mtu 1500\n   ip address 10.252.2.8/31\n!\ninterface
